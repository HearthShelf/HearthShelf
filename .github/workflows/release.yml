name: Release

# Pushing a version tag (v1.2.3) publishes production images + a GitHub Release.
on:
  push:
    tags: ['v*.*.*']

env:
  REGISTRY: ghcr.io

jobs:
  images:
    name: Build & push ${{ matrix.variant }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # slim -> hearthshelf ; aio -> hearthshelf-aio
          - variant: slim
            target: slim
            image: ${{ github.repository }}
          - variant: aio
            target: aio
            image: ${{ github.repository }}-aio
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive # packages/core is a git submodule the image build needs

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          # 1.2.3, 1.2, 1, and latest (latest only for non-prerelease tags).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  release:
    name: Publish GitHub Release
    needs: images
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the changelog can diff against the prior tag

      # Normalize the tag into the version string the website stores, using the
      # same rules as the other HearthShelf products so pre-release labels land
      # in the right channel: v1.2.3-beta.1 -> 1.2.3-Beta1.
      - name: Resolve release version
        id: resolve
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          VER=$(printf '%s' "$RAW" \
            | sed -E 's/-(beta|b)\.?([0-9]+)/-Beta\2/I' \
            | sed -E 's/-(alpha|a)\.?([0-9]+)/-Alpha\2/I' \
            | sed -E 's/-rc\.?([0-9]+)/-RC\1/I')
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $VER"

      # Release notes come from the SAME structured generator that feeds the
      # website, so the GitHub Release and hearthshelf.com never disagree. The
      # Docker pull blocks are appended after the generated sections.
      - name: Generate changelog
        env:
          PRODUCT: HearthShelf-Server
          RELEASE_VERSION: ${{ steps.resolve.outputs.version }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ github.repository }}
        run: |
          chmod +x .github/scripts/changelog-items.sh .github/scripts/render-changelog.sh
          .github/scripts/render-changelog.sh RELEASE_NOTES.md
          {
            echo "## 🐳 Docker images"
            echo ""
            echo "HearthShelf only (point it at your own AudiobookShelf):"
            echo '```'
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME#v}"
            echo '```'
            echo ""
            echo "All-in-one (HearthShelf + bundled AudiobookShelf):"
            echo '```'
            echo "docker pull ${REGISTRY}/${IMAGE_NAME}-aio:${GITHUB_REF_NAME#v}"
            echo '```'
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Publish the structured changelog to hearthshelf.com. Runs after the
      # Release so a website/API outage can't block shipping the release itself.
      # The upload is an idempotent upsert keyed on (product, version), so a
      # re-run of this job is safe.
      - name: Publish changelog to hearthshelf.com
        env:
          CHANGELOG_API_KEY: ${{ secrets.CHANGELOG_API_KEY }}
          CHANGELOG_API_URL: https://hearthshelf.com/api/v1/changelogs
          PRODUCT: HearthShelf-Server
          RELEASE_VERSION: ${{ steps.resolve.outputs.version }}
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          chmod +x .github/scripts/changelog-items.sh .github/scripts/upload-changelog.sh .github/scripts/render-changelog.sh
          .github/scripts/upload-changelog.sh
